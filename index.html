<!DOCTYPE html>
<html>
<head>
<title>Dynamic Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

nav{
    background:#000;
    color:white;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    display:flex;
    list-style:none;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
}

.hero{
    height:90vh;
    background:linear-gradient(
        45deg,
        #007bff,
        #00d4ff
    );
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:55px;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    margin-bottom:30px;
}

button{
    padding:12px 30px;
    border:none;
    background:white;
    color:#007bff;
    font-size:18px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#000;
    color:white;
}
</style>
</head>

<body>

<nav>
<h2>My Website</h2>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>


<section class="hero">

<h1 id="title">
Welcome To My Website
</h1>

<p>
Dynamic HTML + CSS + JavaScript
</p>

<button onclick="changeText()">
Click Me
</button>

</section>


<script>

function changeText(){

document.getElementById("title")
.innerHTML =
"🚀 Website Updated Successfully";

}

</script>

</body>
</html>
